name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Security audit
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 14

      - name: Build
        run: npm run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: CI Summary
        if: always()
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security audit | ${{ steps.cache-deps.outcome == 'skipped' && '⏭️' || '✅' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Typecheck | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ✅ |" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────
  # Production deployment — gated on validate
  # ─────────────────────────────────────────────────────────
  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install wrangler@latest

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=freshwax
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy health check
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 60

          RETRIES=5
          DELAY=15
          for i in $(seq 1 $RETRIES); do
            echo "Health check attempt $i/$RETRIES..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://freshwax.co.uk/api/health/public/)
            if [ "$RESPONSE" = "200" ]; then
              echo "Health check passed (HTTP $RESPONSE)"
              exit 0
            fi
            echo "Health check returned HTTP $RESPONSE"
            if [ "$i" -lt "$RETRIES" ]; then
              echo "Retrying in ${DELAY}s..."
              sleep $DELAY
            fi
          done
          echo "::warning::Health check failed after $RETRIES attempts (HTTP $RESPONSE) — deployment may still be propagating"
