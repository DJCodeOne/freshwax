name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Security audit
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 14

      - name: Build
        run: npm run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: CI Summary
        if: always()
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security audit | ${{ steps.cache-deps.outcome == 'skipped' && '⏭️' || '✅' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Typecheck | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ✅ |" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────
  # Staging: deploy to Cloudflare Pages preview branch
  # ─────────────────────────────────────────────────────────
  deploy-staging:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      staging-url: ${{ steps.staging-deploy.outputs.deployment-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Deploy to staging branch
        id: staging-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=freshwax --branch=staging

      - name: Wait for staging propagation
        run: |
          echo "Staging URL: ${{ steps.staging-deploy.outputs.deployment-url }}"
          echo "Waiting 30s for deployment to propagate..."
          sleep 30

      - name: Staging health check
        run: |
          STAGING_URL="${{ steps.staging-deploy.outputs.deployment-url }}"
          RETRIES=3
          DELAY=10
          for i in $(seq 1 $RETRIES); do
            echo "Staging health check attempt $i/$RETRIES..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/api/health/public/")
            if [ "$RESPONSE" = "200" ]; then
              echo "Staging health check passed (HTTP $RESPONSE)"
              exit 0
            fi
            echo "Staging health check returned HTTP $RESPONSE"
            if [ "$i" -lt "$RETRIES" ]; then
              echo "Retrying in ${DELAY}s..."
              sleep $DELAY
            fi
          done
          echo "::warning::Staging health check failed after $RETRIES attempts — proceeding with E2E tests anyway"

  # ─────────────────────────────────────────────────────────
  # E2E smoke tests against staging
  # ─────────────────────────────────────────────────────────
  smoke-test:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests against staging
        run: npx playwright test --config=playwright.staging.config.ts
        env:
          STAGING_URL: ${{ needs.deploy-staging.outputs.staging-url }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

      - name: Smoke test summary
        if: always()
        run: |
          echo "## E2E Smoke Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Staging URL: ${{ needs.deploy-staging.outputs.staging-url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" = "success" ]; then
            echo "All smoke tests passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Some smoke tests failed. See artifacts for details." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ─────────────────────────────────────────────────────────
  # Production deployment — gated on staging + smoke tests
  # ─────────────────────────────────────────────────────────
  deploy:
    needs: [validate, smoke-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Get previous deployment ID
        id: prev-deploy
        run: |
          PREV_ID=$(CLOUDFLARE_API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            npx wrangler pages deployment list \
              --project-name=freshwax \
              --environment=production \
              --json 2>/dev/null \
            | jq -r '.[0].id // empty')
          echo "id=$PREV_ID" >> "$GITHUB_OUTPUT"
          echo "Previous deployment: $PREV_ID"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=freshwax

      - name: Post-deploy health check
        id: health
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 30

          RETRIES=3
          DELAY=10
          for i in $(seq 1 $RETRIES); do
            echo "Health check attempt $i/$RETRIES..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://freshwax.co.uk/api/health/public/)
            if [ "$RESPONSE" = "200" ]; then
              echo "Health check passed (HTTP $RESPONSE)"
              exit 0
            fi
            echo "Health check failed (HTTP $RESPONSE)"
            if [ "$i" -lt "$RETRIES" ]; then
              echo "Retrying in ${DELAY}s..."
              sleep $DELAY
            fi
          done
          echo "Health check failed after $RETRIES attempts"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.health.outcome == 'failure' && steps.prev-deploy.outputs.id != ''
        run: |
          echo "::error::Health check failed — rolling back to deployment ${{ steps.prev-deploy.outputs.id }}"
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/freshwax/deployments/${{ steps.prev-deploy.outputs.id }}/rollback" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json"
          echo "Rollback initiated. Verifying..."
          sleep 30
          curl -sf https://freshwax.co.uk/api/health/public/ || echo "::warning::Post-rollback health check also failed — manual intervention required"

      - name: Rollback unavailable
        if: failure() && steps.health.outcome == 'failure' && steps.prev-deploy.outputs.id == ''
        run: |
          echo "::error::Health check failed and no previous deployment ID available for rollback. Manual intervention required."
          exit 1
