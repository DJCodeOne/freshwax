name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Security audit
        run: npm audit --omit=dev --audit-level=high || true

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Test
        run: npm run test

  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    environment: production
    timeout-minutes: 10

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=freshwax

      # Post-deploy smoke test: hit the public health endpoint to verify
      # the deployment is live and responding. Retries up to 3 times with
      # a 10-second pause to allow Cloudflare edge propagation.
      - name: Post-deploy health check
        run: |
          for i in 1 2 3; do
            echo "Health check attempt $i..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://freshwax.co.uk/api/health/public/)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Got HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 3 attempts"
          exit 1
