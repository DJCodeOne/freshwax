name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --omit=dev --audit-level=critical || true
        # Remaining moderate/high vulns are in transitive deps (@aws-sdk, wrangler, @lhci/cli)
        # that only run server-side or in CI — not in production client bundles

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      # Test against production (Cloudflare adapter doesn't support local preview in CI)
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouse-ci-production.json
          uploadArtifacts: true
