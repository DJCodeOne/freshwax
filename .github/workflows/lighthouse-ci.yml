name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --production --audit-level=moderate

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      # Test against production (Cloudflare adapter doesn't support local preview in CI)
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouse-ci-production.json
          uploadArtifacts: true
