name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # For scheduled/dispatch runs, test production directly
      - name: Lighthouse CI (production)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouse-ci-production.json
          uploadArtifacts: true

      # For push/PR runs, test against local preview server
      - name: Start preview server
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        run: npm run preview &

      - name: Wait for preview server
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        run: npx wait-on http://localhost:4321 --timeout 30000

      - name: Lighthouse CI (local)
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: .github/lighthouse-ci.json
          uploadArtifacts: true
