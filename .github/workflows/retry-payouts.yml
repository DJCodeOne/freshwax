# .github/workflows/retry-payouts.yml
# Scheduled jobs for payouts and restock notifications

name: Scheduled Jobs

on:
  workflow_dispatch:  # Manual trigger only — schedule handled by Cloudflare cron

jobs:
  retry-payouts:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Retry pending payouts
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://freshwax.co.uk/api/cron/retry-payouts/")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response code: $http_code"
          echo "Response body: $body"

          if [ "$http_code" != "200" ]; then
            echo "Failed with HTTP $http_code"
            exit 1
          fi

          succeeded=$(echo "$body" | jq -r '.succeeded // 0')
          failed=$(echo "$body" | jq -r '.failed // 0')

          echo "::notice title=Payout Retry Results::Succeeded: $succeeded, Failed: $failed"

      - name: Send restock notifications
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "https://freshwax.co.uk/api/cron/send-restock-notifications/")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response code: $http_code"
          echo "Response body: $body"

          if [ "$http_code" = "200" ]; then
            notified=$(echo "$body" | jq -r '.notified // 0')
            echo "::notice title=Restock Notifications::Sent: $notified"
          fi
