name = "freshwax"
compatibility_date = "2025-02-13"
compatibility_flags = ["nodejs_compat_v2"]
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "freshwax-db"
database_id = "909e1932-1e20-4081-a37e-32cf355dec8f"
migrations_dir = "database/migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "349d1fd00f3d4de9811529cc96fd4d8b"

# Required by @astrojs/cloudflare session driver
[[kv_namespaces]]
binding = "SESSION"
id = "349d1fd00f3d4de9811529cc96fd4d8b"

[[r2_buckets]]
binding = "R2"
bucket_name = "freshwax-releases"

[vars]
PUBLIC_RECAPTCHA_SITE_KEY = "6LfojkEsAAAAAJ9A6y9ZIzO-ZaRqdsWCGfXjU-sm"
PUBLIC_GIPHY_API_KEY = "p0USqLUVxus8d82HAcPhQ2GqG6SfraYr"
GIPHY_API_KEY = "p0USqLUVxus8d82HAcPhQ2GqG6SfraYr"

[triggers]
crons = ["0 * * * *", "0 */6 * * *", "0 3 * * *"]