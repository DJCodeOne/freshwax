name = "freshwax"
compatibility_date = "2025-02-13"
compatibility_flags = ["nodejs_compat_v2"]
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "freshwax-db"
database_id = "909e1932-1e20-4081-a37e-32cf355dec8f"
migrations_dir = "database/migrations"

# CACHE and SESSION both alias the same KV namespace intentionally.
# Astro's Cloudflare session driver requires a binding named SESSION,
# while the app cache uses CACHE. They share one KV store but use
# different key prefixes so there is no collision.
[[kv_namespaces]]
binding = "CACHE"
id = "349d1fd00f3d4de9811529cc96fd4d8b"

[[kv_namespaces]]
binding = "SESSION"
id = "349d1fd00f3d4de9811529cc96fd4d8b"

[[r2_buckets]]
binding = "R2"
bucket_name = "freshwax-releases"

[vars]
# NOTE: PUBLIC_FIREBASE_API_KEY is a *public* Firebase Web API key (safe to expose
# client-side). It is NOT a secret. If it were sensitive, it should be moved to
# the Cloudflare dashboard (Settings > Environment Variables > Secrets) instead.
PUBLIC_FIREBASE_API_KEY = "AIzaSyBiZGsWdvA9ESm3OsUpZ-VQpwqMjMpBY6g"
PUBLIC_RECAPTCHA_SITE_KEY = "6LfojkEsAAAAAJ9A6y9ZIzO-ZaRqdsWCGfXjU-sm"
WHIP_BASE_URL = "https://stream.freshwax.co.uk"
RED5_HLS_URL = "https://stream.freshwax.co.uk/live"

# ──────────────────────────────────────────────────────────────────────
# Cron Triggers
# ──────────────────────────────────────────────────────────────────────
# Pages projects do NOT support [triggers]. The scheduler is the dedicated
# freshwax-cron Worker — see workers/freshwax-cron/ (its wrangler.toml is
# the source of truth for the schedule; `wrangler deploy` there applies it).
#
# HISTORY (Jul 14 2026): schedules used to sit on the freshwax-api Worker,
# whose scheduled() handler only console.logged — so NO cron ever actually
# ran until freshwax-cron replaced it. Don't put schedules back there.
#
# ┌──────────────────┬─────────────────────────────────────┬──────────────────────────────────────────────┐
# │ Schedule (UTC)   │ Endpoint                            │ Description                                  │
# ├──────────────────┼─────────────────────────────────────┼──────────────────────────────────────────────┤
# │ 0 * * * *        │ /api/cron/cleanup-reservations      │ Expire stale stock reservations (hourly)     │
# │ 0 */6 * * *      │ /api/cron/retry-payouts             │ Retry failed Stripe/PayPal payouts (6-hourly)│
# │ 0 */6 * * *      │ /api/cron/send-restock-notifications│ Email users when items restock (6-hourly)    │
# │ 0 2 * * *        │ /api/cron/backup-d1                 │ Back up D1 tables to R2 as JSON, then        │
# │ 0 2 * * *        │ (runs inside freshwax-cron worker)  │ sitemap diff → IndexNow ping (Bing/Yandex),  │
# │ 0 2 * * *        │ /api/cron/review-requests           │ then post-purchase review emails (7d+ orders)│
# │ 0 2 * * *        │ /api/cron/release-preorders         │ then complete due pre-orders + notify buyers,│
# │ 0 2 * * *        │ /api/cron/notify-release-interest   │ then email the free "notify me" interest list│
# │ 0 3 * * *        │ /api/cron/cleanup-d1                │ Purge old D1 rows (03:00)                    │
# │ 0 4 * * *        │ /api/cron/image-scan                │ Scan R2 for non-WebP images (04:00)          │
# │ 0 10 * * *       │ /api/cron/verification-reminders    │ Remind unverified users (10:00)              │
# │ 0 10 * * SUN     │ /api/cron/weekly-digest             │ Weekly digest email (Sunday 10:00)           │
# │ DISABLED         │ /api/cron/stock-alerts              │ Low stock admin alerts                       │
# └──────────────────┴─────────────────────────────────────┴──────────────────────────────────────────────┘
#
# Auth: All cron endpoints require Authorization: Bearer $CRON_SECRET
#       or X-Admin-Key header. Endpoints are listed in CSRF_SKIP (src/lib/csrf.ts).
#       CRON_SECRET must match across: Pages project secret, freshwax-cron
#       Worker secret, and local .env (for manual ops).
#
# Manual run: POST https://freshwax.co.uk/api/cron/<job>/ with the bearer, or
#             https://freshwax-cron.davidhagon.workers.dev/run/<job> (same bearer).
#
# GOTCHA: cron endpoints must NEVER fetch https://freshwax.co.uk/* — a Pages
# Function fetching its own hostname 502s intermittently. Also, Pages egress
# to api.indexnow.org dies with a platform 502 (bisected Jul 14 2026), which
# is why the IndexNow job lives inside the freshwax-cron worker, not here.