name = "freshwax"
compatibility_date = "2025-02-13"
compatibility_flags = ["nodejs_compat_v2"]
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "freshwax-db"
database_id = "909e1932-1e20-4081-a37e-32cf355dec8f"
migrations_dir = "database/migrations"

# CACHE and SESSION both alias the same KV namespace intentionally.
# Astro's Cloudflare session driver requires a binding named SESSION,
# while the app cache uses CACHE. They share one KV store but use
# different key prefixes so there is no collision.
[[kv_namespaces]]
binding = "CACHE"
id = "349d1fd00f3d4de9811529cc96fd4d8b"

[[kv_namespaces]]
binding = "SESSION"
id = "349d1fd00f3d4de9811529cc96fd4d8b"

[[r2_buckets]]
binding = "R2"
bucket_name = "freshwax-releases"

[vars]
PUBLIC_RECAPTCHA_SITE_KEY = "6LfojkEsAAAAAJ9A6y9ZIzO-ZaRqdsWCGfXjU-sm"
PUBLIC_GIPHY_API_KEY = "p0USqLUVxus8d82HAcPhQ2GqG6SfraYr"
GIPHY_API_KEY = "p0USqLUVxus8d82HAcPhQ2GqG6SfraYr"

# Cron triggers — configured in Cloudflare dashboard for Pages projects
# (wrangler.toml [triggers] is only supported for Workers, not Pages)
#
# Schedule summary (configure in Cloudflare Dashboard > Pages > Settings > Cron Triggers):
#   0 * * * *    /api/cron/cleanup-reservations   - Expire stale stock reservations
#   0 */6 * * *  /api/cron/retry-payouts           - Retry failed payouts (Stripe/PayPal)
#   0 */6 * * *  /api/cron/send-restock-notifications - Email users when items restock
#   0 3 * * *    /api/cron/cleanup-d1              - Purge old D1 rows (error_logs, pending_orders)
#   0 4 * * *    /api/cron/image-scan              - Scan R2 for non-WebP images
#   0 10 * * *   /api/cron/verification-reminders  - Remind unverified users to verify email
#   DISABLED     /api/cron/stock-alerts            - Low stock admin alerts (disabled)
#
# Auth: All cron endpoints require Authorization: Bearer $CRON_SECRET or X-Admin-Key header