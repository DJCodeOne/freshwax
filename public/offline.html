<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline - freshwax</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#111;color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:1rem}
  .container{max-width:400px}
  .logo{font-size:2rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:#dc2626;margin-bottom:1.5rem}
  h1{font-size:1.5rem;font-weight:700;margin-bottom:.75rem}
  p{color:#9ca3af;margin-bottom:2rem;line-height:1.6}
  button{background:#dc2626;color:#fff;border:none;padding:.75rem 2rem;font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;transition:background .2s}
  button:hover{background:#b91c1c}
  button:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="container">
  <div class="logo">freshwax</div>
  <h1>You're offline</h1>
  <p>It looks like you've lost your internet connection. Check your connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
